    <script>

        //null 병합 연산자
        //- 존재하는 값을 추려내는 기능
        //- null, undefined가 아닌 값을 찾을 때 사용
        //- A ?? B
        //- 편의성을 위한 연산자 > if문으로 대체 가능


        let n1;
        let n2 = 20;
        let n3 = 30;
        let n7;

        let n4 = n1 ?? n2;
        console.log(n4); 

        let n5 = n3 ?? n1;
        console.log(n5);

        let n6 = n2 ?? n3; //둘 다 값이 존재하면 첫번째 값을 반환
        console.log(n6);

        let n8 = n1 ?? n7; //undefined
        console.log(n8);

        //- 별명을 출력하되.. 별명이 없는 사람은 이름을 대신 출력
        let name = '홍길동'; //not null
        let nick = '망치';   //null

        console.log(nick ?? name);
