        //상속
        class Car {
            constructor(name, color) {
                this.name = name;
                this.color = color;
            }
        }

        class SportCar extends Car {
            constructor(name, color, speed) {
                super(name, color);
                this.speed = speed;
            }
            cruise() {
                return `시속 ${this.speed}km로 부릉 부릉`;
            }
        }

        const c1 = new SportCar('벤츠', '노랑', 200);
        console.log(c1.cruise());
